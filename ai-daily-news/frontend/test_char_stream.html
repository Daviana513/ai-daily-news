<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>字符流测试</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            min-height: 100vh;
        }

        .bg-char-stream {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .char-column {
            position: absolute;
            top: 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre;
            line-height: 1.4;
            animation: scrollDown linear infinite;
        }

        @keyframes scrollDown {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100vh);
            }
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="bg-char-stream" id="bgCharStream"></div>

    <div class="content">
        <h1>字符流测试页面</h1>
        <p>如果能看到背景中有滚动的AI术语，说明字符流功能正常。</p>
    </div>

    <script>
        const BG_TERMS = [
            'Transformer', 'inference', 'neural net', 'attention', 'token',
            'embedding', 'gradient', 'GPT', 'diffusion', 'RLHF', 'latency',
            'fine-tune', 'prompt', 'context', 'weights', 'softmax', 'backprop',
            'multimodal', 'benchmark', 'hallucination'
        ];

        const COLUMN_WIDTH = 80;
        const MIN_SPEED = 20;
        const MAX_SPEED = 45;
        const MIN_OPACITY = 0.06;
        const MAX_OPACITY = 0.12;
        const MIN_FONT_SIZE = 11;
        const MAX_FONT_SIZE = 13;

        function initBgCharStream() {
            console.log('初始化背景字符流...');
            const container = document.getElementById('bgCharStream');

            container.innerHTML = '';

            const screenWidth = window.innerWidth;
            const numColumns = Math.floor(screenWidth / COLUMN_WIDTH);
            console.log('屏幕宽度:', screenWidth, '列数:', numColumns);

            for (let i = 0; i < numColumns; i++) {
                const column = document.createElement('div');
                column.className = 'char-column';

                const xPos = (i / numColumns) * 100;
                column.style.left = `${xPos}%`;

                const opacity = MIN_OPACITY + Math.random() * (MAX_OPACITY - MIN_OPACITY);
                column.style.color = `rgba(255, 255, 255, ${opacity.toFixed(3)})`;

                const fontSize = MIN_FONT_SIZE + Math.random() * (MAX_FONT_SIZE - MIN_FONT_SIZE);
                column.style.fontSize = `${fontSize.toFixed(1)}px`;

                const duration = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED);
                column.style.animationDuration = `${duration.toFixed(1)}s`;

                const delay = -Math.random() * duration;
                column.style.animationDelay = `${delay.toFixed(1)}s`;

                let termText = '';
                for (let j = 0; j < 100; j++) {
                    const randomTerm = BG_TERMS[Math.floor(Math.random() * BG_TERMS.length)];
                    termText += randomTerm + '\n';
                }
                column.textContent = termText;

                container.appendChild(column);
            }
            console.log('字符流初始化完成，共生成', numColumns, '列');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initBgCharStream();
        });
    </script>
</body>
</html>
