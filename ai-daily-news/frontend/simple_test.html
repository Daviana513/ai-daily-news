<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简单测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            background: white;
            border: 1px solid #ddd;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #0056b3; }
        .error { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .info { background: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
    </style>
</head>
<body>
    <h1>API连接测试</h1>

    <div id="result" class="result info">
        点击按钮开始测试...
    </div>

    <button onclick="testConnection()">测试API连接</button>
    <button onclick="testGenerate()">测试生成新闻</button>
    <button onclick="clearResult()">清除结果</button>

    <script>
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.textContent = message;
        }

        function clearResult() {
            showResult('点击按钮开始测试...', 'info');
        }

        async function testConnection() {
            showResult('正在测试连接...', 'info');

            try {
                console.log('测试连接到: http://localhost:5000/health');

                const response = await fetch('http://localhost:5000/health', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                console.log('响应状态:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    showResult(`连接成功! 服务: ${data.service}, 状态: ${data.status}`, 'success');
                    console.log('响应数据:', data);
                } else {
                    showResult(`连接失败! 状态码: ${response.status}`, 'error');
                    console.error('错误响应:', response.status);
                }
            } catch (error) {
                showResult(`连接错误: ${error.message}`, 'error');
                console.error('连接错误:', error);
            }
        }

        async function testGenerate() {
            showResult('正在生成新闻，请稍候...', 'info');

            try {
                console.log('开始生成新闻请求');

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 120000);

                const response = await fetch('http://localhost:5000/api/generate-daily-news', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ date: '2026-06-01' }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                console.log('响应状态:', response.status);

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        showResult(`生成成功! 耗时: ${result.performance.total_time}`, 'success');
                        console.log('生成结果:', result);
                    } else {
                        showResult(`生成失败: ${result.error}`, 'error');
                    }
                } else {
                    const errorText = await response.text();
                    showResult(`API错误: ${response.status} - ${errorText}`, 'error');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showResult('请求超时(2分钟)', 'error');
                } else {
                    showResult(`请求错误: ${error.message}`, 'error');
                }
                console.error('请求错误:', error);
            }
        }

        // 页面加载时自动测试连接
        window.addEventListener('load', () => {
            console.log('页面加载完成');
            setTimeout(testConnection, 1000);
        });
    </script>
</body>
</html>
