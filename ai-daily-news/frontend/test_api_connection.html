<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>API连接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        #results {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>API连接测试页面</h1>

    <div class="info">
        <strong>当前配置:</strong><br>
        API地址: <span id="apiUrl">http://localhost:5000</span>
    </div>

    <div>
        <button onclick="testHealth()">测试健康检查</button>
        <button onclick="testGenerateNews()">测试生成新闻</button>
        <button onclick="clearResults()">清除结果</button>
    </div>

    <div id="results"></div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';

        function addResult(message, type) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            resultDiv.textContent = message;
            resultsDiv.appendChild(resultDiv);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testHealth() {
            addResult('正在测试健康检查...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    addResult(`✅ 健康检查成功! 服务: ${data.service}, 状态: ${data.status}`, 'success');
                } else {
                    addResult(`❌ 健康检查失败! 状态码: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ 连接失败! 错误: ${error.message}`, 'error');
            }
        }

        async function testGenerateNews() {
            addResult('正在测试生成新闻...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/api/generate-daily-news`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        addResult(`✅ 新闻生成成功! 耗时: ${result.performance.total_time}`, 'success');
                    } else {
                        addResult(`❌ 新闻生成失败! 错误: ${result.error}`, 'error');
                    }
                } else {
                    addResult(`❌ API请求失败! 状态码: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ 连接失败! 错误: ${error.message}`, 'error');
            }
        }

        // 页面加载时自动测试健康检查
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(testHealth, 1000);
        });
    </script>
</body>
</html>
